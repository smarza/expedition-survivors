name: Unity CI

on:
  push:
    branches:
      - main
      - "agent/**"
  workflow_dispatch:
    inputs:
      build_windows:
        description: Build the Windows acceptance player
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: unity-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UNITY_VERSION: 6000.5.4f1

jobs:
  static-validation:
    name: Static validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Validate repository
        run: python3 tools/validate_project.py

  unity-license:
    name: Unity license preflight
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
    steps:
      - name: Verify Unity secrets are configured
        shell: bash
        run: |
          if [[ -z "$UNITY_EMAIL" || -z "$UNITY_PASSWORD" ]]; then
            echo "UNITY_EMAIL and UNITY_PASSWORD must be configured as GitHub Actions secrets."
            exit 1
          fi

          if [[ -z "$UNITY_LICENSE" && -z "$UNITY_SERIAL" ]]; then
            echo "Configure UNITY_LICENSE for Personal or UNITY_SERIAL for Pro."
            exit 1
          fi

          echo "Unity credentials are configured for CI."

  unity-tests:
    name: Unity EditMode and PlayMode tests
    needs:
      - static-validation
      - unity-license
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: true

      - name: Restore Unity Library cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-tests-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-tests-

      - name: Run Unity tests
        id: unity-tests
        uses: game-ci/unity-test-runner@0ff419b913a3630032cbe0de48a0099b5a9f0ed9 # v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: .
          testMode: All
          artifactsPath: artifacts
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity Test Results

      - name: Upload Unity test results
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: unity-test-results
          path: ${{ steps.unity-tests.outputs.artifactsPath }}
          if-no-files-found: warn
          retention-days: 14

  web-build:
    name: Web compilation
    needs:
      - static-validation
      - unity-license
      - unity-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: true

      - name: Restore Web build Library cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-web-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-web-

      - name: Compile Web player
        uses: game-ci/unity-builder@1d4ee0697f193f54668e98961d79907911f4b4f2 # v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: .
          targetPlatform: WebGL
          buildName: ExpeditionSurvivors
          buildsPath: build

      - name: Verify Web output
        shell: bash
        run: test -f build/WebGL/ExpeditionSurvivors/index.html

      - name: Upload Web build
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: expedition-survivors-web
          path: build/WebGL/ExpeditionSurvivors
          if-no-files-found: error
          retention-days: 14

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: build/WebGL/ExpeditionSurvivors

  deploy-pages:
    name: Publish Web preview
    needs:
      - web-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      actions: read
      pages: write
      id-token: write
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'github-pages' || 'github-pages-preview' }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  windows-build:
    name: Windows milestone compilation
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.build_windows) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[windows]')) }}
    needs:
      - static-validation
      - unity-license
      - unity-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          lfs: true

      - name: Restore Windows build Library cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-windows-

      - name: Compile Windows player
        uses: game-ci/unity-builder@1d4ee0697f193f54668e98961d79907911f4b4f2 # v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: .
          targetPlatform: StandaloneWindows64
          buildName: ExpeditionSurvivors
          buildsPath: build

      - name: Upload Windows build
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: expedition-survivors-windows
          path: build
          if-no-files-found: error
          retention-days: 14
